<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קרנבל המשחקים 🎪</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ff6b6b,#4ecdc4);
  color:white;
  text-align:center;
}
h1 { margin-top:20px; }

.container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
}

.booth {
  background:rgba(0,0,0,0.3);
  padding:20px;
  border-radius:15px;
  width:250px;
  backdrop-filter:blur(10px);
}

button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  margin-top:10px;
}

.score-box {
  margin-top:20px;
  font-size:20px;
}

.leaderboard {
  margin-top:30px;
  background:rgba(0,0,0,0.3);
  padding:15px;
  border-radius:15px;
  max-width:400px;
  margin-left:auto;
  margin-right:auto;
}

input {
  padding:8px;
  border-radius:6px;
  border:none;
  margin-top:10px;
}
</style>
</head>
<body>

<h1>🎪 קרנבל המשחקים 🎪</h1>

<div class="score-box">
  ניקוד שלך: <span id="score">0</span>
</div>

<input type="text" id="playerName" placeholder="השם שלך">

<div class="container">

  <div class="booth">
    <h3>🎯 קליעה למטרה</h3>
    <p>כל פגיעה = 10 נקודות</p>
    <button onclick="addScore(10)">פגעתי!</button>
  </div>

  <div class="booth">
    <h3>🎲 מזל הקוביה</h3>
    <p>נקודות אקראיות</p>
    <button onclick="rollDice()">גלגל קוביה</button>
  </div>

  <div class="booth">
    <h3>⚽ בעיטת פנדל</h3>
    <p>שער = 20 נקודות</p>
    <button onclick="addScore(20)">הכנסתי גול!</button>
  </div>

</div>

<button onclick="saveScore()">💾 שמור ניקוד</button>

<div class="leaderboard">
  <h2>🏆 טבלת מובילים</h2>
  <ol id="leaders"></ol>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  PUT_YOUR_CONFIG_HERE
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let score = 0;

window.addScore = function(points){
  score += points;
  document.getElementById("score").innerText = score;
}

window.rollDice = function(){
  const random = Math.floor(Math.random()*6)+1;
  score += random*5;
  document.getElementById("score").innerText = score;
}

window.saveScore = async function(){
  const name = document.getElementById("playerName").value;
  if(!name) return alert("תכניס שם");

  await addDoc(collection(db,"leaderboard"),{
    name:name,
    score:score,
    createdAt:Date.now()
  });

  alert("נשמר בהצלחה!");
  score=0;
  document.getElementById("score").innerText = 0;
}

const q = query(collection(db,"leaderboard"), orderBy("score","desc"), limit(10));

onSnapshot(q,(snapshot)=>{
  const list = document.getElementById("leaders");
  list.innerHTML="";
  snapshot.forEach(doc=>{
    const li=document.createElement("li");
    li.textContent = doc.data().name + " - " + doc.data().score;
    list.appendChild(li);
  });
});

</script>

</body>
</html>
